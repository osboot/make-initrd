on:
  workflow_call:
    inputs:
      vendor:
        required: true
        type: string
      exclude:
        required: false
        type: string
        default: '[]'
jobs:
  image:
    uses: ./.github/workflows/image.yml
    with:
      vendor: ${{ inputs.vendor }}
  test:
    runs-on: ubuntu-latest
    needs:
      - image
    strategy:
      matrix:
        testcase:
          - btrfs-raid1
          - btrfs-raid1-degraded
          - btrfs-subvol
          - efi-partition
          - efi-reqpartition
          - f2fs-partition
          - initramfs-on-erofs
          - initramfs-on-squashfs
          - iscsiroot
          - luks
          - luks+crypttab+noparam
          - luks+lukskey-noparam
          - luks+lukskey-plain
          - luks+lukskey-raw
          - luks-over-lvm
          - luks-over-raid1
          - lvm
          - lvm+luks
          - nvmfroot
          - partition
          - partition+usr
          - pipeline
          - raid1
          - raid1+raid5
          - raid1-degraded
          - raid5
          - sdcard
          - sshfsroot
          - xfs-partition
          - zfs-partition
        exclude: ${{ fromJson(inputs.exclude) }}
      fail-fast: false
    steps:
      - name: "Get Date"
        id: date
        run: |
          echo "date=$(date +'%Y-%V')" > "$GITHUB_OUTPUT"

      - name: "Get Cache"
        uses: actions/cache@v5
        id: cache
        with:
          path: ~/.images/${{ inputs.vendor }}
          key: vendor-${{ inputs.vendor }}-${{ steps.date.outputs.date }}
          fail-on-cache-miss: true

      - name: "Load podman images"
        run: |
          podman image load -i=$HOME/.images/${{ inputs.vendor }}/image-sysimage.tar.gz
          podman image load -i=$HOME/.images/${{ inputs.vendor }}/image-devel.tar.gz

      - name: "Install Packages"
        run: |
          kver=`uname -r`
          sudo apt-get -qq -y update
          sudo apt-get -qq -y install linux-modules-$kver linux-modules-extra-$kver
          sudo apt-get -qq -y install git qemu-kvm ovmf

      - name: "Prepare Node"
        run: |
          for m in kvm kvm-amd kvm-intel; do sudo modprobe -v "$m" ||:; done
          test -c /dev/kvm && sudo chmod -v 666 /dev/kvm ||:

      - name: "Checkout Repository"
        uses: actions/checkout@v6

      - name: "Checkout Submodules"
        run: |
          git submodule set-url external/busybox/upstream https://github.com/mirror/busybox
          git submodule update --init --recursive

      - name: "Build Sources"
        run: testing/orchestrator.py ${{ inputs.vendor }} test-root-${{ matrix.testcase }} build-sources

      - name: "Build Sysimage"
        run: testing/orchestrator.py ${{ inputs.vendor }} test-root-${{ matrix.testcase }} build-sysimage

      - name: "Build Kickstart"
        run: testing/orchestrator.py ${{ inputs.vendor }} test-root-${{ matrix.testcase }} build-kickstart

      - name: "Run Kickstart"
        env:
          QEMU_TIMEOUT: 40m
          QEMU_MEMORY: 1G
          QEMU_DISK_FORMAT: qcow2
        run: testing/orchestrator.py ${{ inputs.vendor }} test-root-${{ matrix.testcase }} run-kickstart

      - name: "Boot System"
        env:
          QEMU_TIMEOUT: 10m
          QEMU_MEMORY: 1G
          QEMU_DISK_FORMAT: qcow2
        run: testing/orchestrator.py ${{ inputs.vendor }} test-root-${{ matrix.testcase }} run-boot

      - name: "Archive Metrics"
        uses: actions/upload-artifact@v6
        with:
          name: "metrics-${{ inputs.vendor }}-${{ matrix.testcase }}"
          path: testing/status/artifact-*.txt
          if-no-files-found: ignore
          retention-days: 1
